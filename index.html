<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EQ Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1e3d;--navy2:#1a2e54;--blue:#2563eb;--blue-lt:#3b82f6;
  --teal:#0d9488;--green:#16a34a;--amber:#d97706;--red:#dc2626;--purple:#7c3aed;--gold:#f59e0b;
  --bg:#eef2f7;--card:#fff;--border:#d1d9e6;--text:#1e2b45;--muted:#6b7a99;
  --inprog:#dcfce7;--inprog-fg:#15803d;--inprog-bdr:#16a34a;
  --notstart:#fef9c3;--notstart-fg:#854d0e;--notstart-bdr:#ca8a04;
  --blocked:#fee2e2;--blocked-fg:#b91c1c;--blocked-bdr:#dc2626;
  --complete:#dbeafe;--complete-fg:#1d4ed8;--complete-bdr:#2563eb;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{background:var(--navy);padding:13px 24px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--gold)}
.topbar h1{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:1.15rem;font-weight:700;letter-spacing:-.5px}
.tabs{margin-left:auto;display:flex;gap:6px}
.tab-btn{padding:6px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer;transition:.15s}
.tab-btn.active{background:var(--gold);color:var(--navy)}
.tab-btn:not(.active){background:rgba(255,255,255,.1);color:#cdd5e0}
.tab-btn:not(.active):hover{background:rgba(255,255,255,.2)}

.view{display:none;padding:18px 20px}
.view.active{display:block}

.stats{display:flex;gap:11px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 16px;flex:1;min-width:120px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--blue)}
.stat-card.green::before{background:var(--green)}
.stat-card.red::before{background:var(--red)}
.stat-card.purple::before{background:var(--purple)}
.stat-card .label{font-size:.7rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.stat-card .val{font-size:1.5rem;font-weight:700;font-family:'Space Grotesk',sans-serif;line-height:1.1;margin-top:2px}

.chart-section{margin-bottom:32px}
.chart-section-title{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:12px;padding:0 4px}
.chart-scroll{overflow-x:auto;padding-bottom:20px;position:relative}
.chart-inner{display:inline-flex;flex-direction:column;align-items:center;min-width:100%;padding:0 16px}
.hub-node{background:var(--navy);color:#fff;border:3px solid var(--gold);box-shadow:0 4px 20px rgba(15,30,61,.3);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;border-radius:999px;padding:10px 28px;white-space:nowrap;display:flex;align-items:center;gap:12px}
.hub-icon{font-size:1.2rem}
.ws-row{display:flex;gap:10px;align-items:flex-start;padding:0 4px;flex-wrap:wrap;justify-content:center}
.ws-card{width:180px;height:280px;border-radius:14px;border:2.5px solid;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 10px rgba(0,0,0,.08);flex-shrink:0;display:flex;flex-direction:column}
.ws-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.16)}
.ws-card.inprog  {background:var(--inprog);  border-color:var(--inprog-bdr)}
.ws-card.notstart{background:var(--notstart);border-color:var(--notstart-bdr)}
.ws-card.blocked {background:var(--blocked); border-color:var(--blocked-bdr)}
.ws-card.complete{background:var(--complete);border-color:var(--complete-bdr)}
.ws-card-header{padding:9px 10px 6px;flex-shrink:0}
.ws-card-name{font-weight:700;font-size:.77rem;line-height:1.25;display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:5px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:2px}
.dot-high{background:var(--red)}.dot-med{background:var(--amber)}.dot-low{background:var(--green)}
.poc-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.poc-tag{font-size:.63rem;color:var(--muted);font-weight:500;background:rgba(255,255,255,.55);border-radius:5px;padding:2px 5px;white-space:nowrap}
.ws-card-phases{border-top:1.5px solid rgba(0,0,0,.08);padding:7px 9px 8px;display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto}
.phase-row{display:flex;align-items:center;gap:5px;flex-shrink:0}
.phase-label{font-size:.61rem;font-weight:600;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-bar-wrap{width:30px;background:rgba(0,0,0,.1);border-radius:99px;height:4px;flex-shrink:0}
.phase-bar{height:100%;border-radius:99px;transition:.4s}
.pb-order{background:#6366f1}.pb-som{background:#8b5cf6}.pb-pkg{background:#3b82f6}.pb-proc{background:#7c3aed}.pb-rev{background:#0d9488}
.phase-val{font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:700;width:20px;text-align:right;flex-shrink:0}
.ws-card-footer{background:rgba(0,0,0,.06);padding:5px 9px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;margin-top:auto}
.ws-card-footer span{font-size:.62rem;color:var(--muted);font-weight:600}
.ws-card-footer strong{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700}

.action-bar{display:flex;gap:9px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:.14s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:#e08e00}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--blue-lt);background:#f0f6ff}
.btn-sm{padding:4px 10px;font-size:.75rem}
.save-note{font-size:.77rem;color:var(--muted);font-style:italic}

.table-section{margin-bottom:32px}
.table-section-title{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:12px}

.month-selector{display:flex;gap:9px;align-items:center;margin-bottom:16px;padding:12px 16px;background:var(--card);border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.month-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:.15s;color:var(--navy)}
.month-btn.active{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.month-btn:hover:not(.active){border-color:var(--blue-lt);background:#f0f6ff}

.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:16px}
table.tracker{width:100%;border-collapse:collapse;background:var(--card);font-size:.81rem;table-layout:auto}
table.tracker thead th{
  background:var(--navy2);color:#fff;font-weight:600;padding:9px 10px;
  text-align:center;white-space:nowrap;font-family:'Space Grotesk',sans-serif;
  font-size:.77rem;letter-spacing:.02em;position:relative;user-select:none;
}
table.tracker thead th.drag-over-col{background:#1e3a6e;outline:3px solid var(--gold)}
table.tracker thead th .th-inner{display:flex;align-items:center;justify-content:center;gap:6px}
table.tracker thead th .drag-handle-col{
  cursor:grab;opacity:.5;font-size:.85rem;flex-shrink:0;
  padding:2px 3px;border-radius:4px;transition:.12s;
}
table.tracker thead th .drag-handle-col:hover{opacity:1;background:rgba(255,255,255,.15)}
table.tracker thead th .drag-handle-col:active{cursor:grabbing}
table.tracker thead th .col-menu{cursor:pointer;opacity:.5;font-size:.9rem;padding:2px 3px;border-radius:4px;transition:.12s}
table.tracker thead th .col-menu:hover{opacity:1;background:rgba(255,255,255,.15)}

.col-menu-popup{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:1000;min-width:160px;overflow:hidden;top:100%;margin-top:4px}
.col-menu-item{padding:8px 12px;font-size:.8rem;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);transition:.1s}
.col-menu-item:last-child{border-bottom:none}
.col-menu-item:hover{background:#f0f6ff;color:var(--blue)}
.col-menu-item.delete{color:var(--red)}
.col-menu-item.delete:hover{background:#fee2e2}

table.tracker tbody tr{transition:background .1s}
table.tracker tbody tr:nth-child(even){background:#f7faff}
table.tracker tbody tr:hover{background:#eef3fd}
table.tracker tbody tr.dragging-row{opacity:.4;background:#e0eaff!important}
table.tracker tbody tr.drag-over-row{border-top:3px solid var(--gold)}
table.tracker td{padding:7px 9px;border-bottom:1px solid #e8edf5;text-align:center;vertical-align:middle}

td.row-handle{cursor:grab;color:var(--muted);font-size:1rem;padding:0 8px;width:24px}
td.row-handle:active{cursor:grabbing}

table.tracker input,table.tracker select{
  border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:.78rem;
  font-family:'DM Sans',sans-serif;background:#f9fbff;width:100%;text-align:center;outline:none;transition:.12s;
}
table.tracker input:focus,table.tracker select:focus{border-color:var(--blue-lt);background:#fff;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.status-pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.69rem;font-weight:700;white-space:nowrap}
.pill-inprog  {background:var(--inprog);  color:var(--inprog-fg)}
.pill-notstart{background:var(--notstart);color:var(--notstart-fg)}
.pill-blocked {background:var(--blocked); color:var(--blocked-fg)}
.pill-complete{background:var(--complete);color:var(--complete-fg)}
.pct-bar-wrap{background:#e9eef7;border-radius:99px;height:5px;min-width:44px}
.pct-bar{height:100%;border-radius:99px;background:var(--blue);transition:.4s}

.tooltip{position:fixed;background:var(--navy);color:#fff;border-radius:12px;padding:12px 16px;font-size:.79rem;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;min-width:205px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.tooltip.visible{opacity:1}
.tooltip .tt-title{font-weight:700;font-size:.9rem;margin-bottom:8px;color:var(--gold)}
.tooltip table{border-collapse:collapse;width:100%}
.tooltip td{padding:2px 6px 2px 0;color:#cbd5e1}
.tooltip td:last-child{color:#fff;font-weight:600;text-align:right}

.drag-ghost{position:fixed;pointer-events:none;z-index:10000;background:var(--navy2);color:#fff;border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:600;opacity:.85;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}

.col-add-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:2000;min-width:320px}
.col-add-modal.active{display:block}
.col-add-modal h3{margin-bottom:12px;color:var(--navy);font-size:.95rem}
.col-add-modal input{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-family:'DM Sans',sans-serif;font-size:.8rem}
.col-add-modal select{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-family:'DM Sans',sans-serif;font-size:.8rem}
.col-add-modal .btn-group{display:flex;gap:8px;justify-content:flex-end}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.2);z-index:1999}
.modal-overlay.active{display:block}

.weekly-tables-container{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1400px){.weekly-tables-container{grid-template-columns:1fr}}
.weekly-table-section{display:flex;flex-direction:column}
</style>
</head>
<body>

<div class="topbar">
  <h1>EQ Project Tracker</h1>
  <span id="topSaveIndicator" style="font-size:.72rem;color:#86efac;font-weight:500;opacity:0;transition:opacity .5s;margin-left:4px"></span>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('flowchart',this)">🗂 Flowchart</button>
    <button class="tab-btn" onclick="switchTab('initiatives',this)">📋 Initiatives & Updates</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="drag-ghost" id="dragGhost" style="display:none"></div>
<div class="modal-overlay" id="modalOverlay" onclick="closeColModal()"></div>
<div class="col-add-modal" id="colAddModal">
  <h3>Add New Column</h3>
  <input type="text" id="colName" placeholder="Column name (e.g., Owner)"/>
  <input type="text" id="colKey" placeholder="Field key (e.g., owner)"/>
  <select id="colType">
    <option value="text">Text</option>
    <option value="select">Dropdown (Status/Priority)</option>
    <option value="number">Number</option>
  </select>
  <div class="btn-group">
    <button class="btn btn-outline btn-sm" onclick="closeColModal()">Cancel</button>
    <button class="btn btn-primary btn-sm" id="addColBtn">Add Column</button>
  </div>
</div>

<!-- FLOWCHART -->
<div class="view active" id="view-flowchart">
  <div class="stats" id="stats-row"></div>
  <div class="chart-section">
    <div class="chart-section-title" id="flowchartTitle">GC + EQ Initiatives</div>
    <div class="chart-scroll">
      <div class="chart-inner" id="chartInner">
        <div id="hub-wrap" style="margin-bottom:0"><div class="hub-node"><span class="hub-icon">📊</span><span id="hubText">GC + EQ Initiatives</span></div></div>
        <div style="height:30px"></div>
        <div class="ws-row" id="wsRow"></div>
        <div style="height:30px"></div>
      </div>
    </div>
  </div>
</div>

<!-- INITIATIVES & UPDATES TABLE -->
<div class="view" id="view-initiatives">
  <div class="month-selector" id="monthSelector"></div>

  <!-- GC+EQ Initiatives Table -->
  <div class="table-section">
    <div class="table-section-title" id="initTitle">GC + EQ Initiatives</div>
    <div class="action-bar">
      <button class="btn btn-primary" onclick="addRow('initiatives')">＋ Add Row</button>
      <button class="btn btn-gold" onclick="addColumn('initiatives')">➕ Add Column</button>
      <button class="btn btn-outline" onclick="saveAndRefresh()">↺ Sync Flowchart</button>
      <button class="btn btn-outline" onclick="exportCSV('initiatives')">⬇ Export CSV</button>
      <span id="saveIndicator" style="font-size:.77rem;font-weight:600;opacity:0;transition:opacity .5s;margin-left:6px"></span>
      <button class="btn btn-outline" onclick="resetState()" style="margin-left:auto;color:var(--red);border-color:#fca5a5" title="Reset to defaults">↺ Reset</button>
    </div>
    <div class="table-wrap">
      <table class="tracker" id="dataTable">
        <thead><tr id="headerRow"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Weekly Updates Tables (4 weeks) -->
  <div class="weekly-tables-container" id="weeklyTablesContainer"></div>
</div>

<script>
// ═══════════════════════ DEFAULT DATA ════════════════════════════════════════
const DEFAULT_DATA = [
  {id:1,  name:"Initial Stratifications",  poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"14 Apr 2022",target:"23 Jun 2022",order:15,som:10,pkg:10,proc:10,rev:4, eq_co:0,gc_co:6, status:"In Progress"},
  {id:2,  name:"Restratification – HIR",   poc_eq:"TBD",poc_gc:"TBD",priority:"Medium",start:"29 Apr 2022",target:"8 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Not Started"},
  {id:3,  name:"Restratification – Regen", poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"24 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Blocked"},
  {id:4,  name:"Restratification – AD",    poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"14 Apr 2022",target:"23 Jun 2022",order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"In Progress"},
  {id:5,  name:"Change Detection",         poc_eq:"TBD",poc_gc:"TBD",priority:"Medium",start:"29 Apr 2022",target:"8 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Not Started"},
  {id:6,  name:"Fire Impact Assessment",   poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"24 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Blocked"},
  {id:7,  name:"AD Survey Packages",       poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"14 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"In Progress"},
  {id:8,  name:"Survey Packages",          poc_eq:"TBD",poc_gc:"TBD",priority:"Medium",start:"29 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Not Started"},
  {id:9,  name:"Grid Creation",            poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"24 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"Blocked"},
  {id:10, name:"Ad Hoc / Other",           poc_eq:"TBD",poc_gc:"TBD",priority:"High",  start:"29 Apr 2022",target:"3 Jul 2022", order:0, som:0, pkg:0, proc:0, rev:0, eq_co:0,gc_co:0, status:"In Progress"},
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const STORE_KEY = 'eq_tracker_monthly_';
let saveTimer = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentModalType = null;

// ═══════════════════════ PERSISTENCE ═══════════════════════════════════════
function getMonthlySaveKey(){ return STORE_KEY + currentYear + '_' + (currentMonth+1); }

function saveMonthlyData(){
  const key = getMonthlySaveKey();
  const monthData = {
    initiatives: monthlyData.initiatives,
    weekly: monthlyData.weekly,
    colDefs: colDefs,
    weeklyColDefs: weeklyColDefs,
    nextId: nextId,
    nextWeeklyIds: nextWeeklyIds,
  };
  try {
    localStorage.setItem(key, JSON.stringify(monthData));
    showSaveIndicator();
  } catch(e){ console.warn('Save failed:', e); }
}

function loadMonthlyData(){
  const key = getMonthlySaveKey();
  monthlyData = { initiatives: JSON.parse(JSON.stringify(DEFAULT_DATA)), weekly: [{data:[]},{data:[]},{data:[]},{data:[]}] };
  nextId = 11;
  nextWeeklyIds = [1,1,1,1];
  colDefs = getDefaultColDefs();
  weeklyColDefs = getDefaultWeeklyColDefs();
  
  try {
    const raw = localStorage.getItem(key);
    if(raw){
      const m = JSON.parse(raw);
      if(m.initiatives) monthlyData.initiatives = m.initiatives;
      if(m.weekly) monthlyData.weekly = m.weekly;
      if(m.colDefs) colDefs = m.colDefs;
      if(m.weeklyColDefs) weeklyColDefs = m.weeklyColDefs;
      if(m.nextId) nextId = m.nextId;
      if(m.nextWeeklyIds) nextWeeklyIds = m.nextWeeklyIds;
    }
  } catch(e){ console.warn('Load failed:', e); }
}

function resetState(){
  if(!confirm('Reset all data to defaults? This cannot be undone.')) return;
  for(let m=0;m<12;m++) for(let y=2022;y<=2030;y++) localStorage.removeItem(STORE_KEY+y+'_'+(m+1));
  location.reload();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveMonthlyData, 600);
}

function showSaveIndicator(){
  const el = document.getElementById('topSaveIndicator');
  if(!el) return;
  el.textContent = '💾 Auto-saved';
  el.style.opacity = '1';
  clearTimeout(el._ft);
  el._ft = setTimeout(()=>{ el.style.opacity='0'; }, 2400);
}

// ═══════════════════════ COLUMN DEFINITIONS ═══════════════════════════════════
function getDefaultColDefs(){
  return [
    {key:'name',    label:'Workstream',               width:165, fixed:true},
    {key:'poc_eq',  label:'POC (EQ)',                 width:85},
    {key:'poc_gc',  label:'POC (GC)',                 width:85},
    {key:'priority',label:'Priority',                 width:80},
    {key:'start',   label:'Start Date',               width:95},
    {key:'target',  label:'Target Date',              width:95},
    {key:'order',   label:'Order Form<br>(GC+EQ)',    width:64, numeric:true},
    {key:'som',     label:'Start of Month<br>(GC+EQ)',width:72, numeric:true},
    {key:'pkg',     label:'Package<br>Completed (GC)',width:72, numeric:true},
    {key:'proc',    label:'Processing<br>Cmpltd (EQ)',width:76, numeric:true},
    {key:'rev',     label:'Review<br>Completed (GC)', width:72, numeric:true},
    {key:'eq_co',   label:'EQ Carry<br>Over',         width:60, numeric:true},
    {key:'gc_co',   label:'GC Carry<br>Over',         width:60, numeric:true},
    {key:'status',  label:'Status',                   width:100},
  ];
}

function getDefaultWeeklyColDefs(){
  return [
    {key:'title',   label:'Update Title',       width:180, fixed:true},
    {key:'owner',   label:'Owner',              width:100},

let monthlyData = { initiatives: JSON.parse(JSON.stringify(DEFAULT_DATA)), weekly: [{data:[]},{data:[]},{data:[]},{data:[]}] };
let nextId = 11;
let nextWeeklyIds = [1,1,1,1];
let colDefs = getDefaultColDefs();
let weeklyColDefs = getDefaultWeeklyColDefs();

const STATUS_CLS  = {"In Progress":"inprog","Not Started":"notstart","Blocked":"blocked","Complete":"complete"};
const PILL_CLS    = {"In Progress":"pill-inprog","Not Started":"pill-notstart","Blocked":"pill-blocked","Complete":"pill-complete"};
const PRIO_DOT    = {"High":"dot-high","Medium":"dot-med","Low":"dot-low"};

function pctSOM(d)  { return d.som   > 0 ? d.rev/d.som   : 0; }
function pctOrder(d){ return d.order > 0 ? d.rev/d.order : 0; }
function fmt(n)     { return (n*100).toFixed(1)+'%'; }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function switchTab(id, btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

// ═══════════════════════ FLOWCHART ═══════════════════════════════════════════
function renderFlowchart(){
  renderStats();
  document.getElementById('hubText').textContent = `GC + EQ Initiatives — ${MONTHS[currentMonth]} ${currentYear}`;
  const row = document.getElementById('wsRow');
  row.innerHTML = '';
  
  monthlyData.initiatives.forEach(d=>{
    const cls = STATUS_CLS[d.status]||'notstart';
    const dotCls = PRIO_DOT[d.priority]||'dot-low';
    const maxVal = Math.max(d.order,1);
    const phases = [
      {label:'Order Form (GC+EQ)',    val:d.order, bar:'pb-order'},
      {label:'Start of Month (GC+EQ)',val:d.som,   bar:'pb-som'},
      {label:'Package Cmpltd (GC)',   val:d.pkg,   bar:'pb-pkg'},
      {label:'Processing Cmpltd (EQ)',val:d.proc,  bar:'pb-proc'},
      {label:'Review Cmpltd (GC)',    val:d.rev,   bar:'pb-rev'},
    ];
    const phaseHTML = phases.map(ph=>`
      <div class="phase-row">
        <span class="phase-label">${ph.label}</span>
        <div class="phase-bar-wrap"><div class="phase-bar ${ph.bar}" style="width:${Math.min(ph.val/maxVal,1)*100}%"></div></div>
        <span class="phase-val">${ph.val}</span>
      </div>`).join('');

    let card = document.createElement('div');
    card.className = `ws-card ${cls}`;
    card.innerHTML = `
      <div class="ws-card-header">
        <div class="ws-card-name"><span>${d.name}</span><span class="dot ${dotCls}"></span></div>
        <div class="poc-row">
          <span class="poc-tag">EQ: ${d.poc_eq||'–'}</span>
          <span class="poc-tag">GC: ${d.poc_gc||'–'}</span>
        </div>
      </div>
      <div class="ws-card-phases">${phaseHTML}</div>
      <div class="ws-card-footer">
        <span>% (SOM)</span>
        <strong>${fmt(pctSOM(d))}</strong>
      </div>`;
    card.addEventListener('mouseenter',e=>showTooltip(e,d));
    card.addEventListener('mousemove', e=>{ const t=document.getElementById('tooltip'); t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY-10)+'px'; });
    card.addEventListener('mouseleave',()=>hideTooltip());
    row.appendChild(card);
  });
}

function showTooltip(e,d){
  const t=document.getElementById('tooltip');
  t.innerHTML=`<div class="tt-title">${d.name}</div><table>
    <tr><td>POC (EQ)</td><td>${d.poc_eq||'–'}</td></tr>
    <tr><td>POC (GC)</td><td>${d.poc_gc||'–'}</td></tr>
    <tr><td>Priority</td><td>${d.priority}</td></tr>
    <tr><td>Status</td><td>${d.status}</td></tr>
    <tr><td>Order Form</td><td>${d.order}</td></tr>
    <tr><td>Start of Month</td><td>${d.som}</td></tr>
    <tr><td>% (SOM)</td><td>${fmt(pctSOM(d))}</td></tr>
  </table>`;
  t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-10)+'px';
  t.classList.add('visible');
}

function hideTooltip(){ document.getElementById('tooltip').classList.remove('visible'); }

function renderStats(){
  const data = monthlyData.initiatives;
  const total=data.length, inprog=data.filter(d=>d.status==='In Progress').length;
  const blocked=data.filter(d=>d.status==='Blocked').length, done=data.filter(d=>d.status==='Complete').length;
  const avg=data.reduce((s,d)=>s+pctSOM(d),0)/Math.max(total,1);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="label">Total</div><div class="val">${total}</div></div>
    <div class="stat-card green"><div class="label">In Progress</div><div class="val" style="color:var(--green)">${inprog}</div></div>
    <div class="stat-card red"><div class="label">Blocked</div><div class="val" style="color:var(--red)">${blocked}</div></div>
    <div class="stat-card"><div class="label">Complete</div><div class="val" style="color:var(--blue)">${done}</div></div>
    <div class="stat-card purple"><div class="label">Avg % (SOM)</div><div class="val" style="color:var(--purple)">${fmt(avg)}</div></div>`;
}

// ═══════════════════════ TABLE RENDERING ═════════════════════════════════════
function renderTable(type='initiatives'){
  const source = type === 'initiatives' ? monthlyData.initiatives : monthlyData.weekly;
  const cols = type === 'initiatives' ? colDefs : weeklyColDefs;
  const headerId = type === 'initiatives' ? 'headerRow' : 'headerWeekly';
  const bodyId = type === 'initiatives' ? 'tableBody' : 'tableBodyWeekly';

  renderHeaders(type);
  const body = document.getElementById(bodyId);
  if(!body) return;
  body.innerHTML = '';
  
  source.forEach((d,rowIdx)=>{
    const tr = document.createElement('tr');
    const tdHandle = document.createElement('td');
    tdHandle.className = 'row-handle';
    tdHandle.innerHTML = '⠿';
    tdHandle.addEventListener('mousedown', e=>startRowDrag(e, rowIdx, type));
    tr.appendChild(tdHandle);

    cols.forEach(col=>{
      const td = document.createElement('td');
      td.innerHTML = buildCell(d, col, type);
      tr.appendChild(td);
    });

    const tdDel = document.createElement('td');
    tdDel.innerHTML = `<button onclick="deleteRow(${d.id},'${type}')" style="background:none;border:none;cursor:pointer;font-size:.95rem;padding:2px 4px">🗑</button>`;
    tr.appendChild(tdDel);

    body.appendChild(tr);
  });
}

function renderHeaders(type='initiatives'){
  const cols = type === 'initiatives' ? colDefs : weeklyColDefs;
  const headerId = type === 'initiatives' ? 'headerRow' : 'headerWeekly';
  const hr = document.getElementById(headerId);
  if(!hr) return;
  hr.innerHTML = '';

  const thHandle = document.createElement('th');
  thHandle.style.width='28px'; thHandle.style.padding='9px 4px';
  thHandle.innerHTML='<span style="opacity:.4;font-size:.7rem">⠿</span>';
  hr.appendChild(thHandle);

  cols.forEach((col, ci)=>{
    const th = document.createElement('th');
    th.dataset.colIdx = ci;
    th.style.minWidth = col.width+'px';
    th.style.position = 'relative';
    
    const inner = document.createElement('div');
    inner.className = 'th-inner';
    
    const handle = document.createElement('span');
    handle.className = 'drag-handle-col';
    handle.innerHTML = '⠿';
    handle.title = 'Drag to reorder';
    handle.addEventListener('mousedown', e=>startColDrag(e, ci, type));
    inner.appendChild(handle);
    
    const label = document.createElement('span');
    label.textContent = col.label.replace(/<br>/g,' ');
    inner.appendChild(label);
    
    if(!col.fixed){
      const menu = document.createElement('span');
      menu.className = 'col-menu';
      menu.innerHTML = '⋮';
      menu.title = 'Column options';
      menu.addEventListener('click', (e)=>showColMenu(e, ci, type));
      inner.appendChild(menu);
    }
    
    th.appendChild(inner);
    hr.appendChild(th);
  });

  const thDel = document.createElement('th');
  thDel.style.width='32px';
  hr.appendChild(thDel);
}

function buildCell(d, col, type='initiatives'){
  const k = col.key;
  const val = d[k] ?? '';
  
  if(col.select===true || (k==='status' || k==='priority')){
    const options = k==='status' ? ['In Progress','Not Started','Blocked','Complete'] : ['High','Medium','Low'];
    return `<select onchange="updateCell(${d.id},'${k}','${type}',this.value)">${options.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
  }
  if(col.numeric===true){
    return `<input type="number" min="0" value="${val}" onchange="updateCell(${d.id},'${k}','${type}',+this.value)" style="width:${col.width-8}px"/>`;
  }
  if(k===colDefs[0]?.key || k===weeklyColDefs[0]?.key){
    return `<input value="${esc(val)}" onchange="updateCell(${d.id},'${k}','${type}',this.value)" style="text-align:left;font-weight:600;width:${col.width-10}px"/>`;
  }
  return `<input value="${esc(val)}" onchange="updateCell(${d.id},'${k}','${type}',this.value)" style="width:${col.width-6}px"/>`;
}

function updateCell(id,field,type,val){
  const source = type === 'initiatives' ? monthlyData.initiatives : monthlyData.weekly;
  const r = source.find(r=>r.id===id);
  if(r){ r[field]=val; renderTable(type); scheduleSave(); }
}

function deleteRow(id,type){
  const source = type === 'initiatives' ? monthlyData.initiatives : monthlyData.weekly;
  const idx = source.findIndex(r=>r.id===id);
  if(idx>-1){ source.splice(idx,1); renderTable(type); scheduleSave(); }
}

function addRow(type){
  const source = type === 'initiatives' ? monthlyData.initiatives : monthlyData.weekly;
  const cols = type === 'initiatives' ? colDefs : weeklyColDefs;
  const newRow = {id: type === 'initiatives' ? nextId++ : nextWeeklyIds[0]++};
  cols.forEach(col=>{ newRow[col.key] = ''; });
  source.push(newRow);
  renderTable(type);
  scheduleSave();
}

function saveAndRefresh(){ 
  renderFlowchart(); 
  renderTable('initiatives');
  saveMonthlyData(); 
}

function exportCSV(type){
  const source = type === 'initiatives' ? monthlyData.initiatives : monthlyData.weekly;
  const cols = type === 'initiatives' ? colDefs : weeklyColDefs;
  const keys = cols.map(c=>c.key);
  const hdrs = cols.map(c=>c.label.replace(/<br>/g,' '));
  let csv = hdrs.join(',') + '\n';
  source.forEach(d=>{ csv += keys.map(k=>'"'+(d[k]??'')+'"').join(',') + '\n'; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = type === 'initiatives' ? `EQ_Initiatives_${MONTHS[currentMonth]}_${currentYear}.csv` : `EQ_Weekly_${MONTHS[currentMonth]}_${currentYear}.csv`;
  a.click();
}

}

function addWeeklyColumn(w){
  currentModalType = 'weekly'+w;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('colAddModal').classList.add('active');
  document.getElementById('colName').value = '';
  document.getElementById('colKey').value = '';

function closeColModal(){
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('colAddModal').classList.remove('active');

function confirmAddWeeklyColumn(w){
  const name = document.getElementById('colName').value.trim();
  const key = document.getElementById('colKey').value.trim();
  const colType = document.getElementById('colType').value;
  
  if(!name || !key){
    alert('Please fill in both Column Name and Field Key');
    return;
  }
  
  if(weeklyColDefs.find(c=>c.key===key)){
    alert('A column with this key already exists');
    return;
  }
  
  const newCol = {
    key: key,
    label: name,
    width: 120,
    numeric: colType==='number',
    select: colType==='select',
  };
  
  weeklyColDefs.push(newCol);
  monthlyData.weekly.forEach(week=>{ week.data.forEach(row=>{ row[key] = ''; }); });
  
  closeColModal();
  renderWeeklyTables();
  scheduleSave();
}

function deleteWeeklyColumn(w, colIdx){
  const deletedKey = weeklyColDefs[colIdx].key;
  weeklyColDefs.splice(colIdx, 1);
  monthlyData.weekly.forEach(week=>{ week.data.forEach(row=>{ delete row[deletedKey]; }); });

// ═══════════════════════ WEEKLY ROW DRAG ═══════════════════════════════════
let rowDragWeekly = { active:false, srcIdx:null, week:null };

function startRowDragWeekly(e, rowIdx, w){
  e.preventDefault();
  rowDragWeekly.active = true;
  rowDragWeekly.srcIdx = rowIdx;
  rowDragWeekly.week = w;

  const label = monthlyData.weekly[w].data[rowIdx]?.title || 'Row';
  const ghost = document.getElementById('dragGhost');
  ghost.textContent = '↕ ' + label;
  ghost.style.display = 'block';
  ghost.style.left = (e.clientX+12)+'px';
  ghost.style.top = (e.clientY-10)+'px';

  document.addEventListener('mousemove', onRowDragMoveWeekly);
  document.addEventListener('mouseup', onRowDragEndWeekly);
}

function onRowDragMoveWeekly(e){
  if(!rowDragWeekly.active) return;
  document.getElementById('dragGhost').style.left=(e.clientX+12)+'px';
  document.getElementById('dragGhost').style.top=(e.clientY-10)+'px';

  const table = document.getElementById('weeklyTable'+rowDragWeekly.week);
  if(table) table.querySelectorAll('tbody tr').forEach(tr=>{
    tr.classList.remove('drag-over-row');
    const r=tr.getBoundingClientRect();
    if(e.clientY>=r.top && e.clientY<=r.bottom) tr.classList.add('drag-over-row');
  });
}

function onRowDragEndWeekly(e){
  if(!rowDragWeekly.active) return;
  document.getElementById('dragGhost').style.display='none';
  document.removeEventListener('mousemove', onRowDragMoveWeekly);
  document.removeEventListener('mouseup', onRowDragEndWeekly);

  const table = document.getElementById('weeklyTable'+rowDragWeekly.week);
  let targetIdx = null;
  if(table) table.querySelectorAll('tbody tr').forEach((tr,i)=>{
    tr.classList.remove('drag-over-row');
    const r=tr.getBoundingClientRect();
    if(e.clientY>=r.top && e.clientY<=r.bottom) targetIdx=i;
  });

  if(targetIdx!==null && targetIdx!==rowDragWeekly.srcIdx){
    const src = monthlyData.weekly[rowDragWeekly.week].data;
    const [moved] = src.splice(rowDragWeekly.srcIdx,1);
    src.splice(targetIdx,0,moved);
    renderWeeklyTables();
    scheduleSave();
  }
  
  rowDragWeekly.active=false; rowDragWeekly.srcIdx=null; rowDragWeekly.week=null;
}

// ═══════════════════════ WEEKLY COLUMN DRAG ═════════════════════════════════
let colDragWeekly = { active:false, srcIdx:null, week:null };

function startColDragWeekly(e, colIdx, w){
  e.preventDefault();
  colDragWeekly.active = true;
  colDragWeekly.srcIdx = colIdx;
  colDragWeekly.week = w;

  const ghost = document.getElementById('dragGhost');

  ghost.style.display='block';
  ghost.style.left=(e.clientX+12)+'px';
  ghost.style.top=(e.clientY-10)+'px';

  document.addEventListener('mousemove', onColDragMoveWeekly);
  document.addEventListener('mouseup', onColDragEndWeekly);
}

function onColDragMoveWeekly(e){
  if(!colDragWeekly.active) return;
  document.getElementById('dragGhost').style.left=(e.clientX+12)+'px';
  document.getElementById('dragGhost').style.top=(e.clientY-10)+'px';

  const header = document.getElementById('headerWeekly'+colDragWeekly.week);
  if(header) header.querySelectorAll('th[data-col-idx]').forEach(th=>{
    th.classList.remove('drag-over-col');
    const r=th.getBoundingClientRect();
    if(e.clientX>=r.left && e.clientX<=r.right) th.classList.add('drag-over-col');
  });
}

function onColDragEndWeekly(e){
  if(!colDragWeekly.active) return;
  document.getElementById('dragGhost').style.display='none';
  document.removeEventListener('mousemove', onColDragMoveWeekly);
  document.removeEventListener('mouseup', onColDragEndWeekly);

  const header = document.getElementById('headerWeekly'+colDragWeekly.week);
  let targetIdx = null;
  if(header) header.querySelectorAll('th[data-col-idx]').forEach(th=>{
    th.classList.remove('drag-over-col');
    const r=th.getBoundingClientRect();
    if(e.clientX>=r.left && e.clientX<=r.right) targetIdx=+th.dataset.colIdx;
  });

  if(targetIdx!==null && targetIdx!==colDragWeekly.srcIdx){
    const [moved] = weeklyColDefs.splice(colDragWeekly.srcIdx,1);
    weeklyColDefs.splice(targetIdx,0,moved);
    renderWeeklyTables();
    scheduleSave();
  }
  
  colDragWeekly.active=false; colDragWeekly.srcIdx=null; colDragWeekly.week=null;
}

// ═══════════════════════ INIT ═════════════════════════════════════════════════
loadMonthlyData();
renderFlowchart();
</script>
